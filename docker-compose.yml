version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: sl_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dashboard:/usr/share/nginx/html/dashboard:ro
    depends_on: [ktor-node-1, ktor-node-2]
    networks: [streamlink]
    restart: unless-stopped

  ktor-node-1:
    build: { context: ., dockerfile: backend/Dockerfile }
    container_name: sl_signaling_1
    expose: ["8080"]
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ID: NODE_1
      HORUS_SECRET: ${HORUS_SECRET_TOKEN}
    depends_on:
      redis: { condition: service_healthy }
    networks: [streamlink]
    restart: unless-stopped

  ktor-node-2:
    build: { context: ., dockerfile: backend/Dockerfile }
    container_name: sl_signaling_2
    expose: ["8080"]
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ID: NODE_2
      HORUS_SECRET: ${HORUS_SECRET_TOKEN}
    depends_on:
      redis: { condition: service_healthy }
    networks: [streamlink]
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: sl_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
    expose: ["6379"]
    networks: [streamlink]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  coturn:
    image: instrumentisto/coturn:4.6
    container_name: sl_turn
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
    command: >
      -n --fingerprint --lt-cred-mech
      --realm=streamlink.local
      --user=${TURN_USERNAME}:${TURN_PASSWORD}
      --min-port=49152 --max-port=49200
      --no-tcp-relay
    networks: [streamlink]
    restart: unless-stopped

networks:
  streamlink: { driver: bridge }
