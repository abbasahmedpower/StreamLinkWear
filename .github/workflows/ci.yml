name: StreamLink CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

jobs:
  build-test:
    name: Build, Lint, Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew test --no-daemon

      - name: Static Analysis (ktlint)
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.2.1/ktlint
          chmod a+x ktlint
          ./ktlint "app/src/**/*.kt" "wear/src/**/*.kt" "shared/src/**/*.kt" "backend/src/**/*.kt"

      - name: Android lint
        run: ./gradlew lintDebug --no-daemon

      - name: Debug builds
        run: ./gradlew :app:assembleDebug :wear:assembleDebug --no-daemon

      - name: Python syntax checks
        run: python -m py_compile backend/chaos_stream_proxy.py backend/run_chaos_assessment.py ai_training/train_stream_predictor.py ai_training/export_from_room.py

      - name: Chaos smoke test
        run: python backend/run_chaos_assessment.py

      - name: Upload reports and APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: streamlink-ci-artifacts
          if-no-files-found: ignore
          retention-days: 14
          path: |
            app/build/reports/
            wear/build/reports/
            shared/build/reports/
            backend/build/reports/
            app/build/outputs/apk/debug/*.apk
            wear/build/outputs/apk/debug/*.apk
