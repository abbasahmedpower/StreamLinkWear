name: StreamLinkWear CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Android Build + Test ──────────────────────────────────────────────────
  android:
    name: Android Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build shared module
        run: ./gradlew :shared:assembleDebug --no-daemon

      - name: Run shared unit tests
        run: ./gradlew :shared:test --no-daemon

      - name: Build app (debug)
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Build wear (debug)
        run: ./gradlew :wear:assembleDebug --no-daemon

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ github.sha }}
          path: |
            app/build/outputs/apk/debug/*.apk
            wear/build/outputs/apk/debug/*.apk

  # ── Backend Build ─────────────────────────────────────────────────────────
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build backend
        run: |
          cd backend
          ./gradlew buildFatJar --no-daemon

  # ── Docker Build ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t streamlinkwear-backend:${{ github.sha }} ./backend

      - name: Test docker-compose
        run: |
          docker-compose up -d
          sleep 10
          curl -f http://localhost:8081/health || exit 1
          curl -f http://localhost:8082/health || exit 1
          docker-compose down

  # ── AI Model Validation ───────────────────────────────────────────────────
  ai:
    name: AI Model Training Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tensorflow numpy scikit-learn pandas

      - name: Validate training script
        run: |
          cd ai_training
          python train_stream_predictor.py
          ls -la stream_predict_model.tflite

      - name: Upload TFLite model
        uses: actions/upload-artifact@v4
        with:
          name: tflite-model-${{ github.sha }}
          path: ai_training/stream_predict_model.tflite
