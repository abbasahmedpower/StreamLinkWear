name: StreamLink CI/CD

on:
  push:
    branches: [ main, develop, "release/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─── Build & Lint ────────────────────────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Lint (app)
        run: ./gradlew :app:lintDebug --no-daemon
        continue-on-error: true

      - name: Lint (wear)
        run: ./gradlew :wear:lintDebug --no-daemon
        continue-on-error: true

      - name: Build Debug APKs
        run: ./gradlew assembleDebug --no-daemon -x test

      - name: Build Release APKs (unsigned)
        run: ./gradlew assembleRelease --no-daemon -x test

      - name: Upload Phone Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamLink-Phone-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Wear Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamLink-Wear-Debug
          path: wear/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Phone Release APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamLink-Phone-Release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Wear Release APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamLink-Wear-Release
          path: wear/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.html
            wear/build/reports/lint-results-debug.html

  # ─── Backend Build ───────────────────────────────────────────────────────────
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Ktor Fat JAR
        run: ./gradlew :backend:buildFatJar --no-daemon

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: streamlink-backend-jar
          path: backend/build/libs/*-all.jar
          retention-days: 14
